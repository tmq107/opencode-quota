name: Upstream plugin update check

on:
  schedule:
    - cron: "17 8 * * *"
  workflow_dispatch:

concurrency:
  group: upstream-plugin-update-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Reconcile upstream plugin issues
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/check-upstream-plugin-updates.mjs --write-issues

